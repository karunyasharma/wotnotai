<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Account Opening Assistant</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header {
      height: 60px;
      width: 100%;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: fixed;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .badge {
      font-size: 12px;
      background: #22c55e;
      color: black;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* Sidebar (Info Panel) */
    .sidebar {
      position: fixed;
      top: 60px;
      left: 0;
      width: 260px;
      height: calc(100vh - 60px);
      background: rgba(255,255,255,0.03);
      padding: 20px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar h2 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #94a3b8;
    }

    .sidebar ul {
      list-style: none;
      font-size: 13px;
      line-height: 1.8;
    }

    .sidebar li {
      margin-bottom: 8px;
    }

    /* Chat Area */
    .chat-area {
      margin-left: 260px;
      position: absolute;
      top: 60px;
      width: calc(100% - 260px);
      height: calc(100vh - 60px);
    }

    /* Force chatbot fullscreen */
    #wotnot-chat-widget {
      position: fixed !important;
      top: 60px !important;
      left: 260px !important;
      width: calc(100vw - 260px) !important;
      height: calc(100vh - 60px) !important;
      z-index: 999 !important;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 11px;
      color: #64748b;
    }

  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <h1>🏦 Account Opening Assistant</h1>
    <div class="badge">Secure</div>
  </div>

  <!-- Sidebar Info -->
  <div class="sidebar">
    <h2>Services</h2>
    <ul>
      <li>✔ Open New Account</li>
      <li>✔ KYC Verification</li>
      <li>✔ Document Upload</li>
      <li>✔ Account Status</li>
    </ul>

    <h2 style="margin-top:20px;">Need Help?</h2>
    <ul>
      <li>📞 Support: 1800-000-000</li>
      <li>📧 help@bank.com</li>
    </ul>
  </div>

  <!-- Chat Area -->
  <div class="chat-area"></div>

  <!-- WotNot Script -->
  <script src="https://app.wotnot.io/chat-widget/7jU4niR42PEe070842950317zzY2QUXx.js"></script>

  <!-- Footer -->
  <div class="footer">
    © 2026 Account Opening System | Secure & Encrypted
  </div>

</body>
</html>
